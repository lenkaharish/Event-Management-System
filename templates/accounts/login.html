{% extends 'base.html' %}

{% block title %}Login - Event Management System{% endblock %}

{% block content %}
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-body p-5">
                    <h2 class="card-title text-center mb-4" style="color: #667eea;">
                        <i class="fas fa-sign-in-alt"></i> Login
                    </h2>
                    
                    <form method="POST">
                        {% csrf_token %}
                        
                        <div class="mb-3">
                            {{ form.username }}
                        </div>
                        
                        <div class="mb-3">
                            {{ form.password }}
                        </div>
                        
                        <button type="submit" class="btn btn-primary w-100 mb-3">
                            <i class="fas fa-sign-in-alt"></i> Login
                        </button>
                    </form>
                    
                    <hr>
                    
                    <p class="text-center">
                        Don't have an account? <a href="{% url 'register' %}"><strong>Register here</strong></a>
                    </p>
                    
                    <p class="text-center text-muted small">
                        <a href="#">Forgot password?</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}
